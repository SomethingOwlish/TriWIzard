<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .h { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-3); margin: 0 0 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { CharacterCard, StatBlock, DiceRoller, DataTable, Timeline, CommentThread } = window.TriWizardDesignSystem_a98f10;
    function Demo() {
      return (
        <div className="grid">
          <div>
            <p className="h">CharacterCard</p>
            <CharacterCard name="Ivar the Drowned" epithet="Saltbound, third of his line" faction="House Storm" level={7} status="wounded"
              vitals={[{label:'HP',value:'18'},{label:'Armour',value:'4'},{label:'Will',value:'9'}]} />
            <p className="h" style={{marginTop:18}}>StatBlock</p>
            <StatBlock columns={3} stats={[
              {label:'STR',value:16,modifier:3},{label:'DEX',value:12,modifier:1},{label:'CON',value:14,modifier:2},
              {label:'INT',value:9,modifier:-1},{label:'WIS',value:13,modifier:1},{label:'CHA',value:8,modifier:-1}]} />
          </div>
          <div>
            <p className="h">DiceRoller</p>
            <DiceRoller defaultSides={20} modifier={3} />
          </div>
          <div style={{gridColumn:'1 / -1'}}>
            <p className="h">DataTable</p>
            <DataTable
              columns={[{key:'turn',label:'Turn',mono:true,width:60},{key:'actor',label:'Actor'},{key:'deed',label:'Deed'},{key:'roll',label:'Roll',align:'right',mono:true}]}
              rows={[
                {turn:'01',actor:'Ivar',deed:'Breached the ice gate',roll:'17'},
                {turn:'02',actor:'Kára',deed:'Summoned the drowned',roll:'04'},
                {turn:'03',actor:'Master',deed:'The keep answers',roll:'—'},
              ]} />
          </div>
          <div>
            <p className="h">Timeline</p>
            <Timeline events={[
              {time:'Year I',title:'The Crossing',tone:'neutral'},
              {time:'Year III',title:'Oath of Salt',body:'Sworn at the ice gate.',tone:'accent'},
              {time:'Year IV',title:'The Drowning',tone:'dead'},
            ]} />
          </div>
          <div>
            <p className="h">CommentThread</p>
            <CommentThread comments={[
              {author:'Master Vök',role:'Master',time:'2d',body:'Approved. The oath stands.'},
              {author:'Kára',time:'1d',body:'I witnessed the crossing.'},
            ]} onSubmit={()=>{}} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
