<!-- @dsCard group="Type" viewport="700x230" name="Display — Cinzel" subtitle="Monumental carved-stone display scale" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-page); color: var(--text-1); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); width: 86px; flex-shrink: 0; letter-spacing: 0.06em; }
  .spec { font-family: var(--font-display); color: var(--text-1); line-height: 1.05; }
</style>
</head>
<body>
  <div class="row"><span class="meta">88 · 900</span><span class="spec" style="font-size:54px;font-weight:900">Durmstrang</span></div>
  <div class="row"><span class="meta">48 · 700</span><span class="spec" style="font-size:40px;font-weight:700">The Northern Rite</span></div>
  <div class="row"><span class="meta">28 · 600</span><span class="spec" style="font-size:26px;font-weight:600">Halls of the Iron Oath</span></div>
  <div class="row"><span class="meta">22 · 600</span><span class="spec" style="font-size:21px;font-weight:600">Card & section titles</span></div>
</body>
</html>
