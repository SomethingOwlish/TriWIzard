<!-- @dsCard group="Colors" viewport="700x150" name="Ember, Ice & Violet — Accents" subtitle="Candle-brass secondary + TTRPG blue & violet" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); height: 78px; display: flex; align-items: flex-end; padding: 7px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--bone-50); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="sw" style="background:var(--ember-500)"><span class="lbl">ember</span></div>
  <div class="sw" style="background:var(--ember-300)"><span class="lbl" style="color:var(--stone-900)">ember 300</span></div>
  <div class="sw" style="background:var(--ice-500)"><span class="lbl">ice</span></div>
  <div class="sw" style="background:var(--ice-300)"><span class="lbl" style="color:var(--stone-900)">ice 300</span></div>
  <div class="sw" style="background:var(--violet-500)"><span class="lbl">violet</span></div>
  <div class="sw" style="background:var(--violet-300)"><span class="lbl" style="color:var(--stone-900)">violet 300</span></div>
</body>
</html>
