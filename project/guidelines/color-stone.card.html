<!-- @dsCard group="Colors" viewport="700x150" name="Stone — Neutrals" subtitle="Cold dark stone surfaces (dark theme base)" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.06); height: 78px; display: flex; align-items: flex-end; padding: 7px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--bone-300); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="sw" style="background:var(--stone-950)"><span class="lbl">950</span></div>
  <div class="sw" style="background:var(--stone-900)"><span class="lbl">900</span></div>
  <div class="sw" style="background:var(--stone-850)"><span class="lbl">850</span></div>
  <div class="sw" style="background:var(--stone-800)"><span class="lbl">800</span></div>
  <div class="sw" style="background:var(--stone-700)"><span class="lbl">700</span></div>
  <div class="sw" style="background:var(--stone-600)"><span class="lbl">600</span></div>
  <div class="sw" style="background:var(--stone-500)"><span class="lbl">500</span></div>
</body>
</html>
