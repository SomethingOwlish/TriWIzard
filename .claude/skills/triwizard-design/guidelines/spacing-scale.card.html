<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px rhythm with fractional steps" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--accent); border-radius: 2px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); width: 110px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">2 · 8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="lbl">3 · 12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="lbl">4 · 16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="lbl">5 · 24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lbl">6 · 32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="lbl">7 · 48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="lbl">8 · 64px</span><span class="bar" style="width:64px"></span></div>
</body>
</html>
