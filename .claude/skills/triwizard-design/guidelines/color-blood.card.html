<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); height: 78px; display: flex; align-items: flex-end; padding: 7px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--bone-50); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="sw" style="background:var(--blood-700)"><span class="lbl">700</span></div>
  <div class="sw" style="background:var(--blood-600)"><span class="lbl">600</span></div>
  <div class="sw" style="background:var(--blood-500)"><span class="lbl">500</span></div>
  <div class="sw" style="background:var(--blood-400)"><span class="lbl">400</span></div>
  <div class="sw" style="background:var(--blood-300)"><span class="lbl">300</span></div>
  <div class="sw" style="background:var(--blood-200)"><span class="lbl" style="color:var(--stone-900)">200</span></div>
</body>
</html>
