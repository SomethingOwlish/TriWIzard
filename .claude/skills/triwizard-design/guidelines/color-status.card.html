<!-- @dsCard group="Colors" viewport="700x150" name="Status — Vital Signs" subtitle="Alive / wounded / dead semantics" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-sm); height: 84px; border: 1px solid var(--border-1); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; margin-bottom: auto; }
  .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
</style>
</head>
<body>
  <div class="sw"><span class="dot" style="background:var(--status-alive)"></span><span class="lbl">Alive</span><span class="hex">moss · #5B7A4E</span></div>
  <div class="sw"><span class="dot" style="background:var(--status-wounded)"></span><span class="lbl">Wounded</span><span class="hex">rust · #B5601F</span></div>
  <div class="sw"><span class="dot" style="background:var(--status-dead)"></span><span class="lbl">Dead</span><span class="hex">crow · #8A1F2A</span></div>
</body>
</html>
