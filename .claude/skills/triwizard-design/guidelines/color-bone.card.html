<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.06); height: 78px; display: flex; align-items: flex-end; padding: 7px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--stone-900); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="sw" style="background:var(--bone-50)"><span class="lbl">50</span></div>
  <div class="sw" style="background:var(--bone-100)"><span class="lbl">100</span></div>
  <div class="sw" style="background:var(--bone-200)"><span class="lbl">200</span></div>
  <div class="sw" style="background:var(--bone-300)"><span class="lbl">300</span></div>
  <div class="sw" style="background:var(--bone-400)"><span class="lbl">400</span></div>
  <div class="sw" style="background:var(--bone-500)"><span class="lbl">500</span></div>
</body>
</html>
