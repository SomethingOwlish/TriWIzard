<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-page); display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.28em; color: var(--accent-text); }
  .data { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; color: var(--text-1); }
  .grid { display: flex; gap: 28px; align-items: baseline; }
  .k { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.12em; }
</style>
</head>
<body>
  <div class="eyebrow">Chronicle · Year IV · Entry 0xA7</div>
  <div class="grid">
    <div><div class="k">Roll</div><div class="data" style="font-size:30px">d20 → 17</div></div>
    <div><div class="k">Honour</div><div class="data" style="font-size:30px">+248</div></div>
    <div><div class="k">Cohort</div><div class="data" style="font-size:30px">MMXXVI-B</div></div>
  </div>
</body>
</html>
