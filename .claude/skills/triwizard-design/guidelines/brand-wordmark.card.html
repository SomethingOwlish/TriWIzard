<!-- @dsCard group="Brand" viewport="700x220" name="Wordmark" subtitle="Typographic lockup — Cinzel caps + rune sigil" -->
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); display: flex; align-items: center; justify-content: center; height: 220px; }
  body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(120% 90% at 50% -20%, var(--accent-soft), transparent 60%); }
  .lock { position: relative; text-align: center; }
  .rune { font-family: var(--font-display); font-size: 30px; color: var(--accent-text); letter-spacing: 0.4em; margin-bottom: 8px; }
  .mark { font-family: var(--font-display); font-weight: 900; font-size: 52px; letter-spacing: 0.06em; color: var(--text-1); line-height: 1; }
  .mark b { color: var(--accent-text); font-weight: 900; }
  .sub { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--text-3); margin-top: 12px; }
</style>
</head>
<body>
  <div class="lock">
    <div class="rune">ᛏ&nbsp;ᛁ&nbsp;ᛜ</div>
    <div class="mark">TRI<b>WIZARD</b></div>
    <div class="sub">Durmstrang · Larp & Ttrpg</div>
  </div>
</body>
</html>
