<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TriWizard — LARP Cabinet</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); color: var(--text-1); transition: background var(--dur-base) var(--ease-out); }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Cabinet.jsx"></script>
  <script type="text/babel">
    function mount() {
      if (!window.LarpCabinet) return setTimeout(mount, 40);
      const { Cabinet } = window.LarpCabinet;
      ReactDOM.createRoot(document.getElementById('root')).render(<Cabinet onTTRPG={() => alert('Crossing to the TTRPG table…')} />);
    }
    mount();
  </script>
</body>
